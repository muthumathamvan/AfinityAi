{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Afinity AI — Intelligent Voice Platform{% endblock %}</title>

  <!-- Preconnects -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Luxury + Corporate font pairing -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Bootstrap 5 (kept to preserve existing JS & modal plumbing) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <!-- Tailwind CDN for utilities in redesigned templates -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            afinity: {
              50:  '#FBF5EA',
              100: '#F5E8CE',
              200: '#EED9AB',
              300: '#EEC887', // primary
              400: '#D6B06A',
              500: '#B8935A',
              600: '#8E6E40',
              ink:   '#1C1917',
              ink2:  '#2F2A26',
              muted: '#78716C',
              line:  '#EBE4D6',
              cream: 'hsl(40, 20%, 96%)',
            }
          },
          fontFamily: {
            display: ['"Playfair Display"', 'Georgia', 'serif'],
            sans:    ['Inter', 'system-ui', 'sans-serif'],
          },
          boxShadow: {
            luxe: '0 24px 48px -20px rgba(28,25,23,.18), 0 8px 16px -6px rgba(28,25,23,.08)',
            soft: '0 10px 24px -12px rgba(28,25,23,.12), 0 4px 10px -4px rgba(28,25,23,.06)',
          }
        }
      }
    }
  </script>

  <!-- Legacy style.css loaded first so the Afinity theme can override it -->
  <link rel="stylesheet" href="{% static 'style.css' %}">
  <!-- Afinity luxury theme (overrides Bootstrap + legacy styles) -->
  <link rel="stylesheet" href="{% static 'afinity-theme.css' %}">

  <link rel="shortcut icon" href="{% static 'web-app-manifest-192x192.png' %}">

  {% block extra_head %}{% endblock %}
</head>

<body class="bg-afinity-cream text-afinity-ink font-sans antialiased">

  <div id="app" class="flex min-h-screen">
    {% include 'nav.html' %}

    <!-- Backdrop for mobile drawer -->
    <div id="afBackdrop" class="af-backdrop" onclick="afToggleSidebar(false)"></div>

    {% block content %}{% endblock %}
  </div>

  <!-- Bootstrap bundle (modals, dropdowns, collapse used across templates) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // -------- Mobile sidebar toggle (works with any .burger-btn on page) --------
    function afToggleSidebar(force) {
      const sb = document.getElementById('sidebar');
      const bd = document.getElementById('afBackdrop');
      if (!sb) return;
      const open = typeof force === 'boolean' ? force : !sb.classList.contains('open');
      sb.classList.toggle('open', open);
      sb.classList.toggle('active', open);
      bd && bd.classList.toggle('show', open);
      document.body.style.overflow = open && window.innerWidth < 1200 ? 'hidden' : '';
    }

    document.addEventListener('click', function (e) {
      const burger = e.target.closest('.burger-btn, [data-af-toggle-sidebar]');
      if (burger) {
        e.preventDefault();
        afToggleSidebar();
      }
    });

    // -------- Auto-mark current sidebar item active --------
    document.addEventListener('DOMContentLoaded', function () {
      const path = window.location.pathname.replace(/\/$/, '') || '/';
      document.querySelectorAll('#sidebar .sidebar-link').forEach(link => {
        const href = (link.getAttribute('href') || '').replace(/\/$/, '') || '/';
        if (href !== '#' && href !== '/' && path.startsWith(href)) {
          link.closest('.sidebar-item')?.classList.add('af-active');
        } else if (href === path) {
          link.closest('.sidebar-item')?.classList.add('af-active');
        }
      });
      // remove the static 'active' class if we set a more accurate one
      const manualActive = document.querySelectorAll('.sidebar-item.af-active');
      if (manualActive.length) {
        document.querySelectorAll('.sidebar-item.active').forEach(el => {
          if (!el.classList.contains('af-active')) el.classList.remove('active');
        });
      }
    });

    // Close drawer on resize → desktop
    window.addEventListener('resize', () => {
      if (window.innerWidth >= 1200) afToggleSidebar(false);
    });
  </script>

  {% block extra_scripts %}{% endblock %}
</body>
</html>
