{% extends 'base.html' %}
{% load static %}
{% block content %}

<div id="main">

    <!-- HEADER -->
    <header class="mb-3">
        <a href="#" class="burger-btn d-block d-xl-none">
            <i class="bi bi-justify fs-3"></i>
        </a>
    </header>

    <!-- PAGE TITLE -->
    <div class="page-heading">
        <div class="row">
            <div class="col-md-6">
                <h3>Widget Call History</h3>
                <p class="text-muted">ElevenLabs Widget AI Call Records</p>
            </div>
        </div>
    </div>

    <!-- CONTENT -->
    <div class="page-content">
        <section class="section">
            <div class="card">

                <div class="card-header d-flex justify-content-between align-items-center">
                    <h4 class="mb-0">
                        <i class="bi bi-clock-history me-2 text-primary"></i>
                        Widget Calls
                    </h4>

                    <a href="/widget_calls" style="background-color: #D6C496;" class="btn btn-sm">
                        <i class="bi bi-arrow-clockwise me-1"></i>Refresh
                    </a>
                </div>

                <div class="card-body">

                    <!-- FILTERS -->
                    <div class="row mb-4">
                        <div class="col-md-4">
                            <input id="searchInput" class="form-control"
                                   placeholder="Search..." />
                        </div>

                        <!-- <div class="col-md-3">
                            <select id="statusFilter" class="form-select">
                                <option value="">All</option>
                                <option value="Inbound">Inbound</option>
                            </select>
                        </div> -->

                        <div class="col-md-3">
                            <input type="date" id="dateFilter"
                                   class="form-control" />
                        </div>

                        <div class="col-md-2">
                            <button class="btn btn-outline-secondary w-100"
                                    onclick="clearFilters()">Clear</button>
                        </div>
                        <div class="col-md-3">
                                <button class="btn btn-danger btn-sm"
        onclick="deleteSelected()">
    <i class="bi bi-trash"></i> Delete Selected
</button>

                        </div>
                    </div>

                    <!-- TABLE -->
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead class="table-dark">
                                <tr>
                                     <th>
        <input type="checkbox" onclick="toggleAll(this)">
    </th>
                                    <th>Date</th>
                                    <th>Time</th>
                                    <th>Direction</th>
                                    <th>Details</th>
                                </tr>
                            </thead>
                            <tbody id="callHistoryBody"></tbody>
                        </table>
                    </div>

                    <!-- PAGINATION -->
                    <ul class="pagination justify-content-center mt-3"
                        id="pagination"></ul>

                </div>
            </div>
        </section>
    </div>
    <footer>
                <div class="footer clearfix mb-0 text-muted">
                    <div class="float-start">
                        <p>2026 &copy; Afinity AI</p>
                    </div>
                    <div class="float-end">
                        <!-- <p>Powered by <span class="text-primary"><i class="bi bi-robot"></i></span> AI Technology</p> -->
                    </div>
                </div>
            </footer>
</div>

<!-- DETAILS MODAL -->
<div class="modal fade" id="callDetailsModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">
                    <i class="bi bi-info-circle me-2"></i>Call Details
                </h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body" id="callDetailsBody"></div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
/* ================= DATA ================= */
let callHistory = JSON.parse(`{{ call_json|escapejs }}`);
let filteredHistory = [...callHistory];
let currentPage = 1;
const itemsPerPage = 10;

/* ================= INIT ================= */
document.addEventListener("DOMContentLoaded", () => {
    renderTable();
    document.getElementById("searchInput").addEventListener("input", filterCalls);
    document.getElementById("statusFilter").addEventListener("change", filterCalls);
    document.getElementById("dateFilter").addEventListener("change", filterCalls);
});

/* ================= FILTER ================= */
function filterCalls() {
    const search = document.getElementById("searchInput").value.toLowerCase();
    const status = document.getElementById("statusFilter").value;
    const date = document.getElementById("dateFilter").value;

    filteredHistory = callHistory.filter(call => {

        const matchesSearch =
            (call.external_number || "").toLowerCase().includes(search) ||
            (call.direction || "").toLowerCase().includes(search);

        const matchesStatus =
            !status || call.direction === status;

        const matchesDate =
            !date || call.date === date;

        return matchesSearch && matchesStatus && matchesDate;
    });

    currentPage = 1;
    renderTable();
}

/* ================= CLEAR ================= */
function clearFilters() {
    document.getElementById("searchInput").value = "";
    document.getElementById("statusFilter").value = "";
    document.getElementById("dateFilter").value = "";

    filteredHistory = [...callHistory];
    currentPage = 1;
    renderTable();
}

/* ================= TABLE ================= */
function renderTable() {
    const tbody = document.getElementById("callHistoryBody");
    const start = (currentPage - 1) * itemsPerPage;
    const pageData = filteredHistory.slice(start, start + itemsPerPage);

    if (!pageData.length) {
        tbody.innerHTML = `
            <tr>
                <td colspan="4" class="text-center text-muted py-4">
                    No widget calls found
                </td>
            </tr>`;
        return;
    }

    tbody.innerHTML = pageData.map(call => `
        <tr>
        <td>
        <input type="checkbox"
               class="row-check"
               value="${call.id}">
    </td>
            <td>${call.date}</td>
            <td>${call.time}</td>
            <td>
                <span class="badge bg-success">${call.direction}</span>
            </td>
            <td>
                <button class="btn btn-sm btn-outline-primary"
                        onclick="viewCallDetails(${call.id})">
                    <i class="bi bi-eye"></i>
                </button>
            </td>
        </tr>
    `).join("");

    renderPagination();
}

/* ================= PAGINATION ================= */
function renderPagination() {
    const pages = Math.ceil(filteredHistory.length / itemsPerPage);
    const pagination = document.getElementById("pagination");

    if (pages <= 1) {
        pagination.innerHTML = "";
        return;
    }

    let html = "";

    for (let i = 1; i <= pages; i++) {
        html += `
            <li class="page-item ${i === currentPage ? "active" : ""}">
                <a class="page-link" href="#"
                   onclick="changePage(${i})">${i}</a>
            </li>`;
    }

    pagination.innerHTML = html;
}

function changePage(page) {
    currentPage = page;
    renderTable();
}

/* ================= MODAL ================= */


function viewCallDetails(id) {
    const call = callHistory.find(c => c.id === id);
    if (!call) return;

    const audioUrl = `/call-audio/${call.conversation_id}/`;

    document.getElementById("callDetailsBody").innerHTML = `
        <table class="table table-sm">
            <tr><td>Date</td><td>${call.date}</td></tr>
            <tr><td>Source</td><td>${call.external_number}</td></tr>
            <tr><td>Direction</td><td>${call.direction}</td></tr>
        </table>

        ${call.transcript ? `
            <div class="mt-3">
                <strong>Summary</strong>
                <p>${call.transcript}</p>
            </div>
        ` : ""}

        ${call.has_audio ? `
            <audio controls class="w-100 mt-3">
                <source src="${audioUrl}" type="audio/mpeg">
            </audio>
        ` : `<p class="text-muted mt-3">No recording available</p>`}
    `;

    new bootstrap.Modal(
        document.getElementById("callDetailsModal")
    ).show();
}

function toggleAll(source) {
    document.querySelectorAll(".row-check")
        .forEach(cb => cb.checked = source.checked);
}

function deleteSelected() {
    const ids = Array.from(
        document.querySelectorAll(".row-check:checked")
    ).map(cb => cb.value);

    if (!ids.length) {
        alert("Please select at least one record");
        return;
    }

    if (!confirm(`Delete ${ids.length} selected records?`)) return;

    fetch("/widget/delete-selected/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ ids })
    })
    .then(res => res.json())
    .then(data => {
        alert(`Deleted ${data.deleted} records`);
        location.reload();
    })
    .catch(() => alert("Delete failed"));
}


</script>

{% endblock %}
